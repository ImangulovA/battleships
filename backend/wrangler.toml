# Cloudflare Worker config for the daily Battleships global-stats backend.
# Create a D1 DB and paste its id below, then `wrangler deploy`.

name = "battleships-stats"
main = "src/index.js"
compatibility_date = "2024-11-01"

# CORS allowlist (comma-separated). Origin is scheme+host only (no path), so one
# entry covers every GitHub Pages project under the user. Plus localhost ports.
[vars]
ALLOWED_ORIGINS = "https://imangulova.github.io,http://localhost:5173,http://localhost:5174,http://localhost:4173"

# Created with: wrangler d1 create battleships-stats
# (paste the printed database_id here, then run schema.sql and `wrangler deploy`)
[[d1_databases]]
binding = "DB"
database_name = "battleships-stats"
database_id = "PASTE_DATABASE_ID_HERE"
